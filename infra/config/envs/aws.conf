# Smart ACR — Amazon Web Services deployment (template — fill in when provisioned)

ENV_NAME="AWS"
ENV_TYPE="remote"

SSH_HOST=""                                    # e.g. ec2-1-2-3-4.compute-1.amazonaws.com
SSH_USER="ubuntu"
SSH_KEY="~/.ssh/smart-acr-aws.pem"
SSH_PORT="22"

APP_DIR="$HOME/smart-acr"
COMPOSE_FILE="infra/docker/docker-compose.onprem.yml"

CONTAINERS="smart-acr-backend smart-acr-frontend smart-acr-postgres smart-acr-proxy"
POSTGRES_CONTAINER="smart-acr-postgres"
POSTGRES_USER="smartacr"

PUBLIC_URL=""                                  # e.g. https://acr.example.gov.pk
API_HEALTH_PATH="/api/v1/health/ready"
NGINX_HEALTH_PATH="/nginx-health"
