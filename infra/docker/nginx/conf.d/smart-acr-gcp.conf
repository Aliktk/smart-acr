# Smart ACR — GCP VM / HTTP-only nginx config
# For testing deployments without a TLS certificate.
# Switch to smart-acr.conf (+ certs) when you get a domain with HTTPS.

resolver 127.0.0.11 valid=10s ipv6=off;

upstream smart_acr_frontend {
  server frontend:3000;
}

upstream smart_acr_backend {
  server backend:4000;
}

# Nginx stub status — internal only (monitoring)
server {
  listen 8080;
  server_name _;

  location = /nginx-status {
    stub_status on;
    access_log off;
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    deny all;
  }
}

server {
  listen 80;
  server_name _;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "0" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  client_max_body_size 20m;

  location = /nginx-health {
    access_log off;
    return 200 "ok\n";
  }

  location /api/ {
    limit_req zone=smart_acr_api_limit burst=30 nodelay;

    proxy_pass         http://smart_acr_backend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Port  $server_port;
    proxy_read_timeout    120s;
    proxy_connect_timeout  30s;
  }

  location / {
    proxy_pass         http://smart_acr_frontend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Port  $server_port;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_read_timeout    120s;
    proxy_connect_timeout  30s;
  }
}
