global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "smart-acr-backend"
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ["backend:4000"]
        labels:
          service: backend

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "nginx"
    metrics_path: /nginx-status
    static_configs:
      - targets: ["reverse-proxy:80"]
        labels:
          service: proxy
