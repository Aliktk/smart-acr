services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-acr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_acr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smart-acr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: smart-acr-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: smart-acr-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/smart_acr?schema=public
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL_DAYS: 7
      WEB_ORIGIN: http://localhost:3000
      STORAGE_PATH: /workspace/backend/storage
    command: >
      sh -c "pnpm --filter @smart-acr/backend prisma:generate &&
      pnpm --filter @smart-acr/backend prisma:push &&
      pnpm --filter @smart-acr/backend prisma:seed &&
      pnpm --filter @smart-acr/backend start"
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
    container_name: smart-acr-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
  minio_data:
