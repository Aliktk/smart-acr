name: smart-acr

services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-acr-postgres
    restart: unless-stopped
    env_file:
      - ./env/backend.prod.env
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: smart-acr-redis
    restart: unless-stopped
    profiles: ["cache"]
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    image: ${BACKEND_IMAGE_REPO:-smart-acr/backend}:${IMAGE_TAG:-latest}
    container_name: smart-acr-backend
    restart: unless-stopped
    env_file:
      - ./env/backend.prod.env
    environment:
      NODE_ENV: production
      PORT: 4000
      STORAGE_PATH: /var/lib/smart-acr/storage
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - acr_storage:/var/lib/smart-acr/storage
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/api/v1/health/ready').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));\""]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 25s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  migrate:
    image: ${BACKEND_IMAGE_REPO:-smart-acr/backend}:${IMAGE_TAG:-latest}
    container_name: smart-acr-migrate
    profiles: ["ops"]
    env_file:
      - ./env/backend.prod.env
    environment:
      NODE_ENV: production
      PORT: 4000
      STORAGE_PATH: /var/lib/smart-acr/storage
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "node_modules/.bin/prisma migrate deploy"]
    restart: "no"
    networks:
      - internal

  seed:
    image: ${BACKEND_IMAGE_REPO:-smart-acr/backend}:${IMAGE_TAG:-latest}
    container_name: smart-acr-seed
    profiles: ["ops"]
    env_file:
      - ./env/backend.prod.env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "node_modules/.bin/tsx prisma/seed.ts"]
    restart: "no"
    networks:
      - internal

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
    image: ${FRONTEND_IMAGE_REPO:-smart-acr/frontend}:${IMAGE_TAG:-latest}
    container_name: smart-acr-frontend
    restart: unless-stopped
    env_file:
      - ./env/frontend.prod.env
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));\""]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 25s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: smart-acr-proxy
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/nginx-health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
      - edge

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: smart-acr-postgres-backup
    restart: unless-stopped
    profiles: ["backup"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-smart_acr}
      POSTGRES_USER: ${POSTGRES_USER:-smartacr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 14
      BACKUP_KEEP_WEEKS: 8
      BACKUP_KEEP_MONTHS: 6
      BACKUP_SUFFIX: .sql.gz
    volumes:
      - pg_backups:/backups
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  storage-backup:
    image: alpine:3.20
    container_name: smart-acr-storage-backup
    restart: unless-stopped
    profiles: ["backup"]
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache dcron
        echo "0 2 * * * tar -czf /backups/storage-\$$(date +\%Y\%m\%d-\%H\%M\%S).tar.gz -C /data . && find /backups -name 'storage-*.tar.gz' -mtime +14 -delete" | crontab -
        crond -f -l 6
    volumes:
      - acr_storage:/data:ro
      - storage_backups:/backups
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

volumes:
  pg_data:
  pg_backups:
  storage_backups:
  redis_data:
  acr_storage:

networks:
  internal:
    internal: true
  edge:
