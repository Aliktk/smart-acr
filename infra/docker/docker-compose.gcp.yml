# Smart ACR — GCP VM Testing Deployment
# HTTP only (no TLS). Suitable for IP-based testing on GCP.
#
# Usage (from repo root):
#   cd infra/docker
#   docker compose -f docker-compose.gcp.yml --profile ops run --rm migrate
#   docker compose -f docker-compose.gcp.yml --profile ops run --rm seed   # first deploy only
#   docker compose -f docker-compose.gcp.yml up -d
#
# Or use the deploy script:
#   bash infra/scripts/deploy-gcp.sh
#
# Required env files (copy from examples and fill in secrets):
#   infra/docker/env/backend.gcp.env    (from backend.gcp.env.example)
#   infra/docker/env/frontend.gcp.env   (from frontend.gcp.env.example)

name: smart-acr

services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-acr-postgres
    restart: unless-stopped
    env_file:
      - ./env/backend.gcp.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_acr}
      POSTGRES_USER: ${POSTGRES_USER:-smartacr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - internal

  migrate:
    image: smart-acr/backend:latest
    container_name: smart-acr-migrate
    profiles: ["ops"]
    env_file:
      - ./env/backend.gcp.env
    environment:
      NODE_ENV: production
      PORT: 4000
      STORAGE_PATH: /var/lib/smart-acr/storage
    depends_on:
      postgres:
        condition: service_healthy
    command: ["pnpm", "--filter", "@smart-acr/backend", "prisma:migrate:deploy"]
    restart: "no"
    networks:
      - internal

  seed:
    image: smart-acr/backend:latest
    container_name: smart-acr-seed
    profiles: ["ops"]
    env_file:
      - ./env/backend.gcp.env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["pnpm", "--filter", "@smart-acr/backend", "prisma:seed"]
    restart: "no"
    networks:
      - internal

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    image: smart-acr/backend:latest
    container_name: smart-acr-backend
    restart: unless-stopped
    env_file:
      - ./env/backend.gcp.env
    environment:
      NODE_ENV: production
      PORT: 4000
      STORAGE_PATH: /var/lib/smart-acr/storage
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - acr_storage:/var/lib/smart-acr/storage
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/api/v1/health/ready').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 30s
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - internal

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
    image: smart-acr/frontend:latest
    container_name: smart-acr-frontend
    restart: unless-stopped
    env_file:
      - ./env/frontend.gcp.env
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 30s
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - internal

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: smart-acr-proxy
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/smart-acr-gcp.conf:/etc/nginx/conf.d/smart-acr.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/nginx-health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  pg_data:
    driver: local
  acr_storage:
    driver: local

networks:
  internal:
    driver: bridge
